name: Skill request
description: Propose a new skill or extension
labels: [enhancement, skill]
body:
  - type: input
    id: summary
    attributes:
      label: What skill do you need?
      placeholder: e.g. HubSpot deal enrichment workflow
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Desired workflow
      description: Describe inputs, outputs, and success criteria.
    validations:
      required: true
